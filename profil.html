<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Analizi - GitHub Analizörü</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container py-2">
            <a class="navbar-brand fw-bold fs-4" href="index.html" style="color: var(--text-color);">
                <i class="bi bi-github me-2"></i>Analizör
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="border-color: var(--card-border);">
                <i class="bi bi-list fs-2" style="color: var(--text-color);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-medium" href="index.html"
                            style="color: var(--text-secondary);">Arama</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="ozellikler.html"
                            style="color: var(--text-secondary);">Özellikler</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="hakkimizda.html"
                            style="color: var(--text-secondary);">Hakkımızda</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="iletisim.html"
                            style="color: var(--text-secondary);">İletişim</a></li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <button id="themeToggleBtn" class="btn btn-sm d-flex align-items-center justify-content-center"
                            style="width:42px;height:42px;border-radius:50%;background-color:var(--card-bg);border:1px solid var(--card-border);color:var(--text-color);">
                            <i id="themeIcon" class="bi bi-sun-fill fs-5"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div id="profileContainer">
            <div class="text-center py-5 animate-fade-up">
                <div class="spinner-border" style="color: var(--text-color); width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Yükleniyor...</span>
                </div>
                <p class="mt-3" style="color: var(--text-secondary);">Profil analiz ediliyor...</p>
            </div>
        </div>
    </main>

    <footer class="custom-footer text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0" style="color: var(--text-secondary);">&copy; 2026 Geliştirici Analizörü.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
    <script src="profil.js"></script>
</body>

</html>
