<!DOCTYPE html>

<html lang="tr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profil Analizörü</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">


    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container py-2">
            <a class="navbar-brand fw-bold fs-4" href="index.html" style="color: var(--text-color);">
                <i class="bi bi-github me-2"></i>Analizör
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="border-color: var(--card-border);">
                <i class="bi bi-list fs-2" style="color: var(--text-color);"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-medium active" href="index.html"
                            style="color: var(--text-color);">Arama</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="ozellikler.html"
                            style="color: var(--text-secondary);">Özellikler</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="hakkimizda.html"
                            style="color: var(--text-secondary);">Hakkımızda</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="iletisim.html"
                            style="color: var(--text-secondary);">İletişim</a></li>


                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <button id="themeToggleBtn" class="btn btn-sm d-flex align-items-center justify-content-center"
                            style="width: 42px; height: 42px; border-radius: 50%; background-color: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-color);">

                            <i id="themeIcon" class="bi bi-sun-fill fs-5"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <main class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center py-5">
        <div class="text-center animate-fade-up w-100" style="max-width: 600px;">
            <div class="bento-icon mx-auto mb-4"
                style="background-color: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-color);">
                <i class="bi bi-search fs-3"></i>
            </div>
            <h1 class="display-4 fw-bolder mb-3" style="letter-spacing: -1px;">Profili Keşfet.</h1>
            <p class="lead mb-5" style="color: var(--text-secondary);">Geliştiricinin GitHub istatistiklerine minimal ve
                net bir arayüzle ulaşın.</p>
        </div>


        <div class="w-100 animate-fade-up delay-1" style="max-width: 550px;">
            <div class="input-group shadow-sm">
                <input type="text" id="searchInput" class="form-control custom-input search-input"
                    placeholder="Kullanıcı adını yazın..." aria-label="GitHub Kullanıcı Adı">
                <button class="btn btn-primary custom-btn search-btn" id="searchBtn" type="button">Analiz Et</button>
            </div>
        </div>


        <div id="historySection" class="w-100 mt-3" style="max-width: 550px; display: none;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span
                    style="color: var(--text-secondary); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;">
                    <i class="bi bi-clock-history me-1"></i>Son Aramalar
                </span>
                <button id="clearHistoryBtn"
                    style="background: none; border: none; color: var(--text-secondary); font-size: 0.78rem; cursor: pointer; padding: 0;">Temizle</button>
            </div>
            <div id="historyChips" class="d-flex flex-wrap gap-2"></div>
        </div>


        <div id="resultsContainer" class="mt-5 w-100" style="max-width: 800px;">
        </div>
    </main>


    <footer class="custom-footer text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0" style="color: var(--text-secondary);">&copy; 2026 Geliştirici Analizörü.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
