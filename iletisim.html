<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - GitHub Profil Analizörü</title>
    <!-- Modern Fontlar ve İkonlar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container py-2">
            <a class="navbar-brand fw-bold fs-4" href="index.html" style="color: var(--text-color);">
                <i class="bi bi-github me-2"></i>Analizör
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="border-color: var(--card-border);">
                <i class="bi bi-list fs-2" style="color: var(--text-color);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-medium" href="index.html"
                            style="color: var(--text-secondary);">Arama</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="ozellikler.html"
                            style="color: var(--text-secondary);">Özellikler</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="hakkimizda.html"
                            style="color: var(--text-secondary);">Hakkımızda</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium active" href="iletisim.html"
                            style="color: var(--text-color);">İletişim</a></li>

                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <button id="themeToggleBtn" class="btn btn-sm d-flex align-items-center justify-content-center"
                            style="width: 42px; height: 42px; border-radius: 50%; background-color: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-color);">
                            <i id="themeIcon" class="bi bi-sun-fill fs-5"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex flex-column justify-content-center align-items-center">
        <div class="w-100" style="max-width: 600px;">
            <div class="text-center animate-fade-up mb-4">
                <h1 class="display-4 fw-bolder mb-3" style="letter-spacing: -1px;">Bağlantı Kur</h1>
                <p class="lead" style="color: var(--text-secondary);">Geri bildiriminiz varsa, bize kolayca ulaşın.</p>
            </div>

            <form id="contactForm" class="p-4 p-md-5 custom-card animate-fade-up delay-1">

                <div id="formAlert" class="alert d-none" role="alert"></div>

                <div class="mb-4">
                    <label for="nameInput" class="form-label custom-label">Adınız Soyadınız</label>
                    <input type="text" class="form-control custom-input" id="nameInput" placeholder="Örn: Eray M.">
                </div>

                <div class="mb-4">
                    <label for="emailInput" class="form-label custom-label">E-posta Adresiniz</label>
                    <input type="email" class="form-control custom-input" id="emailInput"
                        placeholder="adiniz@ornek.com">
                </div>

                <div class="mb-5">
                    <label for="messageInput" class="form-label custom-label">Mesajınız</label>
                    <textarea class="form-control custom-input" id="messageInput" rows="5"
                        placeholder="Görüşlerinizi, katkılarınızı yazabilirsiniz..."></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn custom-btn" id="submitBtn">Formu Gönder</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="custom-footer text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0" style="color: var(--text-secondary);">&copy; 2026 Geliştirici Analizörü.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
